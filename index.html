<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>计件工资</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f7f7fa;padding:6px}
.main{max-width:100%;margin:0 auto;background:#fff;border-radius:10px;padding:10px}
h3{text-align:center;margin-bottom:8px;font-size:17px}

.item-head{display:grid;grid-template-columns:2fr 1fr 1fr 40px;gap:5px;font-size:12px;color:#666;margin-bottom:4px}
.item{display:grid;grid-template-columns:2fr 1fr 1fr 40px;gap:5px;margin-bottom:5px}
.item input{padding:6px;border:1px solid #eee;border-radius:4px;font-size:12px;width:100%}
.item-del{background:#f33;color:#fff;border:none;border-radius:4px;font-size:11px}

.tpl-box{border:1px solid #eee;border-radius:6px;padding:8px;margin-bottom:8px;background:#fcfcfc}
.tpl-title{font-weight:bold;margin-bottom:6px;text-align:center;font-size:13px}
.tpl-input{display:grid;grid-template-columns:1fr 70px;gap:5px;margin-bottom:6px}
.tpl-input input{padding:6px;border:1px solid #eee;border-radius:4px;font-size:12px}
.tpl-list{display:flex;flex-wrap:wrap;gap:5px;max-height:90px;overflow-y:auto}
.tpl-item{background:#f8f8f8;border:1px solid #eee;border-radius:4px;padding:4px 6px;font-size:12px;display:flex;align-items:center}
.tpl-use{color:#007aff;margin-right:4px;cursor:pointer;font-weight:bold}
.tpl-text{cursor:pointer;flex:1}
.tpl-del{color:#f33;margin-left:4px;cursor:pointer}

.day-box{border:1px solid #eee;border-radius:6px;padding:8px;margin-bottom:6px}
.day-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.day-left{display:flex;align-items:center;gap:5px}
.day-total{color:#007aff;font-weight:bold;font-size:13px}
.day-rest{color:#f33;font-weight:bold;font-size:13px}
.del-btn{padding:4px 6px;background:#f33;color:white;border:none;border-radius:4px;font-size:11px}
.collapse-btn{font-size:14px;padding:0 2px;cursor:pointer}

.add-row-btn{width:100%;padding:6px;margin-top:5px;background:#007aff;color:#fff;border:none;border-radius:4px;font-size:12px}

button{cursor:pointer}
.export{background:#007aff;width:100%;margin-top:6px;padding:7px;border:none;border-radius:5px;color:#fff;font-size:13px}
.clear-trash{background:#999;width:100%;margin-top:6px;padding:7px;border:none;border-radius:5px;color:#fff;font-size:13px}
.all-total{text-align:right;font-size:14px;font-weight:bold;margin-top:8px;padding-top:6px;border-top:1px solid #f0f0f0}

.trash-box{border:1px solid #eee;border-radius:6px;padding:8px;margin-top:8px;background:#fcfcfc}
.trash-title{font-weight:bold;margin-bottom:5px;text-align:center;font-size:13px}
.trash-item{display:flex;justify-content:space-between;align-items:center;padding:5px;font-size:12px;border-bottom:1px solid #f0f0f0}
.trash-item:last-child{border-bottom:none}
.trash-restore{padding:3px 6px;background:#007aff;color:#fff;border:none;border-radius:4px;font-size:11px;margin-right:4px}
.trash-delete{padding:3px 6px;background:#f33;color:#fff;border:none;border-radius:4px;font-size:11px}

.btn-row{
  display:flex;gap:5px;margin-top:8px
}
.btn-half{
  flex:1;padding:7px;border:none;border-radius:5px;color:#fff;font-size:13px
}
.btn-expand{
  background:#2da678;
}
.btn-collapse{
  background:#6c757d;
}
</style>
</head>
<body>

<div class="main">
  <h3>计件工资</h3>

  <div class="tpl-box">
    <div class="tpl-title">常用工序</div>
    <div class="tpl-input">
      <input id="tplName" placeholder="工序名称">
      <input id="tplPrice" placeholder="单价" type="number" step="0.5" min="0.5">
    </div>
    <button onclick="addTpl()" style="width:100%;background:#007aff;margin-bottom:6px;padding:6px;border:none;border-radius:4px;color:#fff">➕ 添加模板</button>
    <div id="tplList" class="tpl-list"></div>
  </div>

  <div id="days"></div>
  
  <div style="display:flex;gap:5px;margin-top:8px">
    <button style="flex:1;background:#007aff;padding:7px;border:none;border-radius:5px;color:#fff;font-size:13px" onclick="addWorkDay()">➕ 上班</button>
    <button style="flex:1;background:#999;padding:7px;border:none;border-radius:5px;color:#fff;font-size:13px" onclick="addRestDay()">😴 休息</button>
    <button style="flex:1;background:#f33;padding:7px;border:none;border-radius:5px;color:#fff;font-size:13px" onclick="clearEmptyItems()">🗑 清空白</button>
  </div>

  <div class="btn-row">
    <button class="btn-half btn-expand" onclick="expandAll()">📂 一键展开所有</button>
    <button class="btn-half btn-collapse" onclick="collapseAll()">📁 一键收起所有</button>
  </div>

  <button class="export" onclick="exportAll()">📊 导出 Excel</button>

  <div class="all-total">全月总计：<span id="allTotal">0.00</span> 元</div>

  <div class="trash-box">
    <div class="trash-title">🗑 回收站（仅保留3天）</div>
    <div id="trashList"></div>
    <button class="clear-trash" onclick="clearTrash()">清空回收站</button>
  </div>
</div>

<script>
function debounce(func, wait){
  let timer;
  return (...args)=>{
    clearTimeout(timer);
    timer=setTimeout(()=>func(...args), wait);
  }
}

function getTodayMD(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}/${m}/${day}`;
}

function parseMD(s){
  if(!s) return 0;
  const parts = s.split('/');
  if(parts.length!==3) return 0;
  const y=+parts[0], m=+parts[1], d=+parts[2];
  return y*10000+m*100+d;
}

function sortDays(arr){
  return [...arr].sort((a,b)=>parseMD(a.md)-parseMD(b.md));
}

const defaultTpl = [
  { name: "41D后盖", price: 2.0 },
  { name: "39B半轴", price: 4.0 },
  { name: "904半轴", price: 3.5 },
  { name: "2004半轴", price: 4.0 },
  { name: "LY1104——30A托架", price: 4.5 },
  { name: "EP半轴", price: 4.0 },
  { name: "1204半轴", price: 3.5 },
  { name: "T14大油底壳", price: 5.0 },
  { name: "101大制动器", price: 3.0 },
  { name: "T7大油底壳", price: 5.0 },
  { name: "102制动器", price: 3.0 },
  { name: "过桥壳体", price: 6.0 },
  { name: "传动箱", price: 5.0 },
  { name: "提升轴支架", price: 3.0 },
  { name: "704制动器", price: 1.0 },
  { name: "1-4-30托架", price: 4.5 }
];

let savedData = JSON.parse(localStorage.getItem('jijian_final'));
if (!savedData) {
  savedData = { days: [], trash: [], tpl: defaultTpl, editRecords: {} };
}
const data = savedData;

function cleanTrashAfter3Days() {
  const now = Date.now();
  const threeDays = 3*24*60*60*1000;
  data.trash = data.trash.filter(item=> item.delTime && now-item.delTime < threeDays);
}

window.addEventListener('beforeunload', ()=>{
  delete data.manualExpand;
  localStorage.setItem('jijian_final', JSON.stringify(data));
});

window.onload=()=>{
  cleanTrashAfter3Days();
  renderAll();
  renderTpl();
  save();
}

function renderTpl(){
  let h='';
  data.tpl.forEach((o,i)=>{
    h+=`<div class="tpl-item">
          <span class="tpl-use" onclick="useTpl(${i})">+</span>
          <span class="tpl-text" onclick="editTpl(${i})">${o.name} ${o.price}元</span>
          <span class="tpl-del" onclick="delTpl(${i})">✕</span>
        </div>`;
  });
  tplList.innerHTML=h;
}

function addTpl(){
  const n=tplName.value.trim();
  const p=parseFloat(tplPrice.value);
  if(!n||isNaN(p)||p<0.5){alert('工序名必填，单价≥0.5');return;}
  data.tpl.push({name:n,price:p});
  save();renderTpl();tplName.value='';tplPrice.value='';
}

function delTpl(i){
  if(confirm('删除该模板？')){data.tpl.splice(i,1);save();renderTpl();}
}

function editTpl(i){
  const item=data.tpl[i];
  let res=prompt("名称："+item.name+"\n单价："+item.price+"\n格式：名称|单价",item.name+"|"+item.price);
  if(!res)return;
  let arr=res.split("|");
  let newName=(arr[0]||"").trim();
  let newPrice=parseFloat(arr[1]||0);
  if(!newName||isNaN(newPrice)||newPrice<0.5){alert("格式错误");return;}
  data.tpl[i].name=newName; data.tpl[i].price=newPrice;
  save();renderTpl();
}

function useTpl(i){
  const t=data.tpl[i];
  const today=getTodayMD();
  let di=data.days.findIndex(x=>x.md===today&&x.type==='work');
  if(di===-1){data.days.push({type:'work',md:today,items:[]});di=data.days.length-1;}
  data.days[di].items.push({name:t.name,price:t.price,count:''});
  save();renderAll();
}

function renderAll(){
  const sd=sortDays(data.days);
  const today=getTodayMD();
  let h='';
  sd.forEach((day,i)=>{
    let sum=0;
    if(day.type==='work'){
      sum=day.items.reduce((t,it)=>t+(+it.price||0)*(+it.count||0),0);
    }
    let display="block";
    if(data.manualExpand && data.manualExpand[day.md]!=null){
      display=data.manualExpand[day.md]?"block":"none";
    }else{
      let needCollapse=false;
      if(day.md!==today)needCollapse=true;
      if((i+1)%5===0)needCollapse=true;
      if(needCollapse)display="none";
    }
    h+=`<div class="day-box">
          <div class="day-head">
            <div class="day-left">
              <span class="collapse-btn" onclick="toggleDay(${i},'${day.md}')">▼</span>
              <input type="date" style="padding:4px;width:140px;font-size:12px" 
                value="${day.md.replace(/\//g,'-')}" onchange="updDayFromDate(${i},this.value)">
              <button class="del-btn" onclick="moveToTrash(${i})">删</button>
            </div>
            ${day.type==='work'?`<div class="day-total">当日：${sum.toFixed(2)}</div>`:'<div class="day-rest">休息日</div>'}
          </div>
          <div id="dayWrap${i}" style="display:${display}">
            ${day.type==='work'?`
            <div class="item-head"><div>工序</div><div>单价</div><div>数量</div><div>操作</div></div>
            <div id="dayItems${i}"></div>
            <button class="add-row-btn" onclick="addOneItem(${i})">➕ 新增一行</button>`:''}
          </div>
        </div>`;
  });
  days.innerHTML=h;
  sd.forEach((day,i)=>{if(day.type==='work')renderDay(i);});
  renderTrash(); sumAll();
}

function toggleDay(i,md){
  const e=document.getElementById('dayWrap'+i);
  const now=e.style.display==='none';
  e.style.display=now?'block':'none';
  if(!data.manualExpand)data.manualExpand={};
  data.manualExpand[md]=now;
  save();
}

function expandAll(){
  document.querySelectorAll('[id^="dayWrap"]').forEach((el,idx)=>{
    el.style.display='block';
    if(data.days[idx]){if(!data.manualExpand)data.manualExpand={};data.manualExpand[data.days[idx].md]=true;}
  });
  save();
}

function collapseAll(){
  document.querySelectorAll('[id^="dayWrap"]').forEach((el,idx)=>{
    el.style.display='none';
    if(data.days[idx]){if(!data.manualExpand)data.manualExpand={};data.manualExpand[data.days[idx].md]=false;}
  });
  save();
}

function renderDay(i){
  const d=data.days[i];
  let h='';
  d.items.forEach((it,j)=>{
    h+=`<div class="item">
          <input placeholder="工序" value="${it.name}" oninput="updItem(${i},${j},'name',this.value)">
          <input placeholder="单价" value="${it.price}" type="number" step="0.5" oninput="updItem(${i},${j},'price',this.value)">
          <input placeholder="数量" value="${it.count}" type="number" oninput="updItem(${i},${j},'count',this.value)">
          <button class="item-del" onclick="delOneItem(${i},${j})">✕</button>
        </div>`;
  });
  document.getElementById('dayItems'+i).innerHTML=h;
}

function addOneItem(dayIdx){
  data.days[dayIdx].items.push({name:"",price:"",count:""});
  save();renderAll();
}
function delOneItem(dayIdx,itemIdx){
  data.days[dayIdx].items.splice(itemIdx,1);
  save();renderAll();
}

function moveToTrash(i){
  const day=data.days[i];
  day.delTime=Date.now();
  data.trash.push(day);
  data.days.splice(i,1);
  cleanTrashAfter3Days();
  save();renderAll();
}

function renderTrash(){
  let h='';
  if(data.trash.length===0)h='<div style="padding:6px;text-align:center;color:#999">空</div>';
  else data.trash.forEach((it,i)=>{
    h+=`<div class="trash-item">
          <div>${it.md} ${it.type==="work"?"上班":"休息"}</div>
          <div>
            <button class="trash-restore" onclick="restoreFromTrash(${i})">恢复</button>
            <button class="trash-delete" onclick="permanentDelete(${i})">删除</button>
          </div>
        </div>`;
  });
  trashList.innerHTML=h;
}

function updDayFromDate(i,v){
  if(!v)return;
  const [y,m,d]=v.split('-');
  const newMd=`${y}/${m}/${d}`;
  if(data.days.some((x,j)=>j!==i&&x.md===newMd)){alert("日期重复");return;}
  delete data.editRecords[data.days[i].md];
  data.days[i].md=newMd;
  data.editRecords[newMd]=Date.now();
  save();renderAll();
}

function addWorkDay(){
  const md=getTodayMD();
  if(data.days.some(x=>x.md===md)){
    if(!confirm("当天已有记录，是否覆盖为上班？"))return;
    data.days=data.days.filter(x=>x.md!==md);
  }
  data.days.push({type:'work',md,items:[]});
  data.editRecords[md]=Date.now();
  save();renderAll();
}

function addRestDay(){
  const md=getTodayMD();
  if(data.days.some(x=>x.md===md)){
    if(!confirm("当天已有记录，是否覆盖为休息？"))return;
    data.days=data.days.filter(x=>x.md!==md);
  }
  data.days.push({type:'rest',md});
  save();renderAll();
}

function restoreFromTrash(i){
  const day=data.trash[i];
  if(data.days.some(x=>x.md===day.md)){alert("日期已存在");return;}
  data.days.push(day);
  data.trash.splice(i,1);
  save();renderAll();
}
function permanentDelete(i){
  if(confirm("永久删除？")){data.trash.splice(i,1);save();renderTrash();}
}
function clearTrash(){
  if(confirm("清空回收站？")){data.trash=[];save();renderTrash();}
}
function clearEmptyItems(){
  let ch=false;
  data.days.forEach(day=>{
    if(day.type==='work'){
      const oldLen=day.items.length;
      day.items=day.items.filter(it=>it.name&&it.price&&it.count);
      if(day.items.length<oldLen)ch=true;
    }
  });
  if(ch){save();renderAll();alert("已清空空白项");}else alert("无空白项");
}

const updItem=debounce((di,ii,k,v)=>{
  const it=data.days[di].items[ii];
  if(k==='price')it.price=Math.max(0.5,parseFloat(v)||0);
  else if(k==='count')it.count=Math.max(0,parseInt(v)||0);
  else it.name=v.trim();
  data.editRecords[data.days[di].md]=Date.now();
  save();renderAll();sumAll();
},300);

function sumAll(){
  let total=0;
  sortDays(data.days).forEach(day=>{
    if(day.type==='work'){
      total+=day.items.reduce((s,it)=>s+(+it.price||0)*(+it.count||0),0);
    }
  });
  allTotal.innerText=total.toFixed(2);
}

function save(){
  localStorage.setItem('jijian_final',JSON.stringify(data));
}

function exportAll(){
  try{
    const sd=sortDays(data.days);
    let csv="\uFEFF日期,类型,工序,单价,数量,小计\n";
    sd.forEach(day=>{
      if(day.type==='rest'){csv+=`${day.md},休息日,,,\n`;return;}
      let daySum=0;
      day.items.forEach(it=>{
        const p=+it.price||0,c=+it.count||0,t=p*c;daySum+=t;
        csv+=`${day.md},上班,${it.name},${p},${c},${t.toFixed(2)}\n`;
      });
      csv+=`${day.md},当日合计,,,,${daySum.toFixed(2)}\n`;
    });
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download="计件工资.csv";
    a.click();
  }catch(e){alert("导出失败："+e.message);}
}
</script>
</body>
</html>
